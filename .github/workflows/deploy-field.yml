name: Deploy to GitHub Pages

# Publishes the field app at the site root and the office admin at /admin,
# to a `gh-pages` branch (Settings -> Pages -> Deploy from a branch -> gh-pages /root).
#   Field app:   https://brandenroybal.github.io/roybal-restoration-app/
#   Office admin: https://brandenroybal.github.io/roybal-restoration-app/admin/

on:
  push:
    branches:
      - claude/field-restoration-app-s6j2zk
      - main
    paths:
      - "apps/field/**"
      - "apps/admin/**"
      - ".github/workflows/deploy-field.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Assemble site (field at /, admin at /admin)
        run: |
          set -e
          rm -rf _site && mkdir -p _site/admin
          cp -r apps/field/. _site/
          cp -r apps/admin/. _site/admin/
          touch _site/.nojekyll

      - name: Publish to the gh-pages branch
        run: |
          set -e
          cd _site
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "Deploy field + admin ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
