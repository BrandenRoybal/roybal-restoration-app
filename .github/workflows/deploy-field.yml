name: Deploy Field App to GitHub Pages

# Publishes apps/field (the offline-first Field Forms PWA) as a static site.
# Live URL after the first successful run:
#   https://brandenroybal.github.io/roybal-restoration-app/

on:
  push:
    branches:
      - claude/field-restoration-app-s6j2zk
      - main
    paths:
      - "apps/field/**"
      - ".github/workflows/deploy-field.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5
        # Pages is enabled in repo Settings (Source: GitHub Actions); just read config.

      - name: Upload field app as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/field

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
