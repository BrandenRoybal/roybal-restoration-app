name: Deploy Field App to GitHub Pages

# Publishes apps/field (the offline-first Field Forms PWA) to a `gh-pages`
# branch. Then set repo Settings -> Pages -> Source: "Deploy from a branch"
# -> Branch: gh-pages / (root).
# Live URL: https://brandenroybal.github.io/roybal-restoration-app/

on:
  push:
    branches:
      - claude/field-restoration-app-s6j2zk
      - main
    paths:
      - "apps/field/**"
      - ".github/workflows/deploy-field.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Publish apps/field to the gh-pages branch
        run: |
          set -e
          cd apps/field
          touch .nojekyll                      # serve files as-is (no Jekyll)
          git init -q
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -q -b gh-pages
          git add -A
          git commit -q -m "Deploy field app ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
