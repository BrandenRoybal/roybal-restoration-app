<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Field cards &amp; tiles</title>
<style>
:root{--navy:#0f1b2d;--panel:#fff;--ink:#1a2433;--muted:#5b6b80;--line:#d9e0ea;--orange:#f26a21;--orange-dark:#d4520f;--green:#1f9d55;--shadow:0 2px 10px rgba(15,27,45,.08);--radius:12px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#eef2f7;color:var(--ink);margin:0;padding:24px}
h2{font-size:16px;margin:0 0 8px;color:var(--navy)}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow)}
.joblist{display:flex;flex-direction:column;gap:10px}
.jobrow{display:flex;align-items:center;gap:12px}
.jobrow__main{flex:1;min-width:0}
.jobrow__title{font-weight:700;font-size:16px}
.jobrow__sub{color:var(--muted);font-size:13px}
.jobrow__chev{color:var(--muted);font-size:22px}
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tile{background:#fff;border:1px solid var(--line);border-radius:var(--radius);padding:14px;color:var(--ink);box-shadow:var(--shadow);display:flex;flex-direction:column;gap:6px;min-height:92px}
.tile--hero{grid-column:1 / -1;background:var(--navy);color:#fff;border-color:var(--navy)}
.tile--hero .tile__count{color:#9fb3cc}
.tile__icon{font-size:22px}.tile__name{font-weight:700;font-size:15px}.tile__count{font-size:12px;color:var(--muted)}
.tile__badge{align-self:flex-start;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;background:#eef2f7;color:var(--navy)}
.tile__badge.done{background:#e3f6ec;color:var(--green)}
.tile__badge.todo{background:#fdeee6;color:var(--orange-dark)}
</style>
</head>
<body>
  <h2>Project list rows</h2>
  <div class="card joblist">
    <div class="jobrow"><div class="jobrow__main"><div class="jobrow__title">8421 Jewel Lake Rd</div><div class="jobrow__sub">RC-2024-0142 · Water · Cat 2</div></div><div class="jobrow__chev">›</div></div>
    <div class="jobrow"><div class="jobrow__main"><div class="jobrow__title">1207 W 32nd Ave</div><div class="jobrow__sub">RC-2024-0139 · Fire</div></div><div class="jobrow__chev">›</div></div>
  </div>

  <h2 style="margin-top:18px">Form tiles (project home)</h2>
  <div class="tiles">
    <div class="tile tile--hero"><div class="tile__icon">🏠</div><div class="tile__name">8421 Jewel Lake Rd</div><div class="tile__count">RC-2024-0142 · Active</div></div>
    <div class="tile"><div class="tile__icon">📋</div><div class="tile__name">Inspection</div><span class="tile__badge done">Complete</span></div>
    <div class="tile"><div class="tile__icon">💧</div><div class="tile__name">Drying Log</div><span class="tile__badge todo">In progress</span></div>
    <div class="tile"><div class="tile__icon">📷</div><div class="tile__name">Photos</div><div class="tile__count">12 uploaded</div></div>
    <div class="tile"><div class="tile__icon">✍️</div><div class="tile__name">Work Auth</div><span class="tile__badge">Not started</span></div>
  </div>
</body>
</html>
