<!-- @dsCard group="Foundations" name="Status colors" subtitle="Job pipeline palette" width="900" height="420" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Status colors</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-1">Status colors</h1>
  <p class="text-sm text-slate-400 mb-6">Job pipeline stages — used for dots, badges (color + <code>22</code> alpha bg), and accents</p>

  <div class="grid grid-cols-2 sm:grid-cols-3 gap-4">
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#64748B"></span><span class="text-xs font-bold text-slate-300">New</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#64748B22;color:#64748B">New</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#64748B</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#f26a21"></span><span class="text-xs font-bold text-slate-300">Active</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#f26a2122;color:#f26a21">Active</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#f26a21</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#3B82F6"></span><span class="text-xs font-bold text-slate-300">Drying</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#3B82F622;color:#3B82F6">Drying</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#3B82F6</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#e0a800"></span><span class="text-xs font-bold text-slate-300">Final Inspection</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#e0a80022;color:#e0a800">Final Inspection</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#e0a800</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#A855F7"></span><span class="text-xs font-bold text-slate-300">Invoicing</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#A855F722;color:#A855F7">Invoicing</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#A855F7</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3"><span class="w-2.5 h-2.5 rounded-full" style="background:#1f9d55"></span><span class="text-xs font-bold text-slate-300">Closed</span></div>
      <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#1f9d5522;color:#1f9d55">Closed</span>
      <p class="text-xs font-mono text-slate-600 mt-3">#1f9d55</p>
    </div>
  </div>
</body>
</html>
