<!-- @dsCard group="Foundations" name="Brand colors" subtitle="Core palette + slate scale" width="960" height="560" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Brand colors</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-1">Brand colors</h1>
  <p class="text-sm text-slate-400 mb-6">Defined as <code class="text-[#f26a21]">@theme</code> tokens in <code>index.css</code></p>

  <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-4 mb-8">
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3 border border-[#1f3354]" style="background:#0f1b2d"></div>
      <p class="text-sm font-semibold text-white">navy</p>
      <p class="text-xs font-mono text-slate-500">#0f1b2d</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3 border border-[#1f3354]" style="background:#16263d"></div>
      <p class="text-sm font-semibold text-white">navy-dark</p>
      <p class="text-xs font-mono text-slate-500">#16263d</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#1f3354"></div>
      <p class="text-sm font-semibold text-white">navy-border</p>
      <p class="text-xs font-mono text-slate-500">#1f3354</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#f26a21"></div>
      <p class="text-sm font-semibold text-white">orange</p>
      <p class="text-xs font-mono text-slate-500">#f26a21</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#d4520f"></div>
      <p class="text-sm font-semibold text-white">orange-hover</p>
      <p class="text-xs font-mono text-slate-500">#d4520f</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#1f9d55"></div>
      <p class="text-sm font-semibold text-white">success</p>
      <p class="text-xs font-mono text-slate-500">#1f9d55</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#e0a800"></div>
      <p class="text-sm font-semibold text-white">warning</p>
      <p class="text-xs font-mono text-slate-500">#e0a800</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-full h-14 rounded-xl mb-3" style="background:#d23b2e"></div>
      <p class="text-sm font-semibold text-white">danger</p>
      <p class="text-xs font-mono text-slate-500">#d23b2e</p>
    </div>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Slate scale (UI text & surfaces)</p>
  <div class="flex flex-wrap gap-2">
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#F1F5F9"></div><p class="text-xs text-slate-500 mt-1 font-mono">100</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#E2E8F0"></div><p class="text-xs text-slate-500 mt-1 font-mono">200</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#CBD5E1"></div><p class="text-xs text-slate-500 mt-1 font-mono">300</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#94A3B8"></div><p class="text-xs text-slate-500 mt-1 font-mono">400</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#64748B"></div><p class="text-xs text-slate-500 mt-1 font-mono">500</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#475569"></div><p class="text-xs text-slate-500 mt-1 font-mono">600</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#334155"></div><p class="text-xs text-slate-500 mt-1 font-mono">700</p></div>
    <div class="text-center"><div class="w-16 h-12 rounded-lg" style="background:#1f3354"></div><p class="text-xs text-slate-500 mt-1 font-mono">800</p></div>
  </div>
</body>
</html>
