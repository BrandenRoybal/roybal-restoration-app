<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Alerts</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Alerts</h1>
  <div class="max-w-md space-y-4">
    <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-3"><p class="text-red-400 text-sm">Invalid email or password.</p></div>
    <div class="rounded-xl p-3" style="background:#1f9d551a;border:1px solid #1f9d554d"><p class="text-sm" style="color:#1f9d55">Job saved successfully.</p></div>
    <div class="rounded-xl p-3" style="background:#e0a8001a;border:1px solid #e0a8004d"><p class="text-sm" style="color:#e0a800">3 pieces of equipment are past their scheduled removal date.</p></div>
    <div class="rounded-xl p-3" style="background:#3B82F61a;border:1px solid #3B82F64d"><p class="text-sm" style="color:#60A5FA">QuickBooks sync runs nightly at 2:00 AM AKST.</p></div>
  </div>
</body>
</html>
