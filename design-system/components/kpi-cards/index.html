<!-- @dsCard group="Components" name="KPI / stat cards" subtitle="Dashboard metric tiles" width="960" height="320" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KPI cards</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">KPI / stat cards</h1>

  <div class="grid grid-cols-2 lg:grid-cols-5 gap-4">
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style="background:#f26a2122"><i data-lucide="briefcase" class="w-[18px] h-[18px]" style="color:#f26a21"></i></div>
      <p class="text-2xl font-black text-white">8</p>
      <p class="text-xs font-semibold text-slate-400 mt-0.5">Active Jobs</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style="background:#3B82F622"><i data-lucide="droplets" class="w-[18px] h-[18px]" style="color:#3B82F6"></i></div>
      <p class="text-2xl font-black text-white">5</p>
      <p class="text-xs font-semibold text-slate-400 mt-0.5">In Drying</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style="background:#A855F722"><i data-lucide="file-text" class="w-[18px] h-[18px]" style="color:#A855F7"></i></div>
      <p class="text-2xl font-black text-white">2</p>
      <p class="text-xs font-semibold text-slate-400 mt-0.5">Awaiting Invoice</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style="background:#e0a80022"><i data-lucide="hard-drive" class="w-[18px] h-[18px]" style="color:#e0a800"></i></div>
      <p class="text-2xl font-black text-white">23</p>
      <p class="text-xs font-semibold text-slate-400 mt-0.5">Equipment Out</p>
      <p class="text-xs text-slate-600 mt-0.5">pieces deployed</p>
    </div>
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="w-9 h-9 rounded-xl flex items-center justify-center mb-3" style="background:#1f9d5522"><i data-lucide="dollar-sign" class="w-[18px] h-[18px]" style="color:#1f9d55"></i></div>
      <p class="text-2xl font-black text-white">$10,000</p>
      <p class="text-xs font-semibold text-slate-400 mt-0.5">Open A/R (est.)</p>
      <p class="text-xs text-slate-600 mt-0.5">invoicing stage</p>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
