<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pipeline column</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <div class="max-w-xs">
    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-4">
      <div class="flex items-center gap-2 mb-3">
        <span class="w-2.5 h-2.5 rounded-full" style="background:#f26a21"></span>
        <span class="text-xs font-bold text-slate-300">Active</span>
        <span class="ml-auto text-xs font-bold px-2 py-0.5 rounded-full" style="background:#f26a2122;color:#f26a21">3</span>
      </div>
      <div class="space-y-2">
        <button class="w-full text-left bg-[#16263d] rounded-xl p-3 border border-[#1f3354] hover:border-[#f26a21]/40 transition-colors group">
          <p class="text-xs font-bold text-slate-300 truncate group-hover:text-white">8421 Jewel Lake Rd</p>
          <p class="text-xs text-slate-600 mt-0.5">RC-2024-0142</p>
          <p class="text-xs text-slate-600">DOL: 03/14/2024</p>
        </button>
        <button class="w-full text-left bg-[#16263d] rounded-xl p-3 border border-[#1f3354] hover:border-[#f26a21]/40 transition-colors group">
          <p class="text-xs font-bold text-slate-300 truncate group-hover:text-white">1207 W 32nd Ave</p>
          <p class="text-xs text-slate-600 mt-0.5">RC-2024-0139</p>
          <p class="text-xs text-slate-600">DOL: 03/09/2024</p>
        </button>
        <button class="w-full text-left bg-[#16263d] rounded-xl p-3 border border-[#1f3354] hover:border-[#f26a21]/40 transition-colors group">
          <p class="text-xs font-bold text-slate-300 truncate group-hover:text-white">340 Muldoon Rd</p>
          <p class="text-xs text-slate-600 mt-0.5">RC-2024-0131</p>
        </button>
        <button class="flex items-center gap-1 text-xs text-[#f26a21] hover:underline w-full px-1">+2 more <i data-lucide="chevron-right" class="w-3 h-3"></i></button>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
