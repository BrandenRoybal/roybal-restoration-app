<!-- @dsCard group="Components" name="Inputs" subtitle="Text field, label, search" width="900" height="480" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Inputs</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Inputs</h1>

  <div class="max-w-md space-y-6">
    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-2 tracking-wide">Email</label>
      <input type="email" value="branden@roybalconstruction.com" class="w-full bg-[#1f3354] border border-[#4A4440] rounded-xl px-4 h-12 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-[#f26a21] transition-colors">
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-2 tracking-wide">Password</label>
      <input type="password" value="password" class="w-full bg-[#1f3354] border border-[#4A4440] rounded-xl px-4 h-12 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-[#f26a21] transition-colors">
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-2 tracking-wide">Empty / placeholder</label>
      <input type="text" placeholder="e.g. 123 Main St, Anchorage" class="w-full bg-[#1f3354] border border-[#4A4440] rounded-xl px-4 h-12 text-slate-100 placeholder-slate-600 focus:outline-none focus:border-[#f26a21] transition-colors">
    </div>

    <div>
      <label class="block text-xs font-semibold text-slate-400 mb-2 tracking-wide">Search (with icon)</label>
      <div class="relative">
        <i data-lucide="search" class="w-4 h-4 absolute left-3 top-1/2 -translate-y-1/2 text-slate-500"></i>
        <input type="text" placeholder="Search address, job #, owner…" class="w-full bg-[#0f1b2d] border border-[#1f3354] rounded-xl pl-9 pr-9 h-10 text-sm text-slate-200 placeholder-slate-600 focus:outline-none focus:border-[#f26a21] transition-colors">
        <button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300"><i data-lucide="x" class="w-[14px] h-[14px]"></i></button>
      </div>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
