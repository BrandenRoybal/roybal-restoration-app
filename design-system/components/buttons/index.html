<!-- @dsCard group="Components" name="Buttons" subtitle="Primary / pills / danger / secondary / ghost / loading" width="900" height="560" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Buttons</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}@keyframes spin{to{transform:rotate(360deg)}}.spin{animation:spin .7s linear infinite}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Buttons</h1>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Primary</p>
  <div class="flex flex-wrap items-center gap-4 mb-8">
    <button class="flex items-center gap-2 bg-[#f26a21] hover:bg-[#d4520f] text-[#16263d] font-bold px-4 h-10 rounded-xl transition-colors"><i data-lucide="plus" class="w-[18px] h-[18px]"></i>New Job</button>
    <button class="bg-[#f26a21] hover:bg-[#d4520f] text-[#16263d] font-bold h-12 px-6 rounded-xl transition-colors">Sign In</button>
    <button class="bg-[#f26a21] disabled:opacity-60 text-[#16263d] font-bold h-12 px-6 rounded-xl flex items-center justify-center gap-2" disabled><span class="w-5 h-5 border-2 border-[#16263d]/30 border-t-[#16263d] rounded-full spin"></span></button>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Filter pills</p>
  <div class="flex flex-wrap gap-2 mb-8">
    <button class="px-3 h-9 rounded-xl text-xs font-bold transition-colors border bg-[#f26a21] border-[#f26a21] text-[#16263d]">All</button>
    <button class="px-3 h-9 rounded-xl text-xs font-bold transition-colors border bg-[#0f1b2d] border-[#1f3354] text-slate-400 hover:text-slate-200">Active</button>
    <button class="px-3 h-9 rounded-xl text-xs font-bold transition-colors border bg-[#0f1b2d] border-[#1f3354] text-slate-400 hover:text-slate-200">Drying</button>
    <button class="px-3 h-9 rounded-xl text-xs font-bold transition-colors border bg-[#0f1b2d] border-[#1f3354] text-slate-400 hover:text-slate-200">Invoicing</button>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Secondary &amp; danger</p>
  <div class="flex flex-wrap items-center gap-4 mb-8">
    <button class="px-3 h-8 bg-[#1f3354] text-slate-300 text-xs font-bold rounded-lg hover:bg-[#4A4440] transition-colors">Cancel</button>
    <button class="px-3 h-8 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-lg transition-colors">Yes, Delete</button>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Ghost / icon</p>
  <div class="flex flex-wrap items-center gap-4">
    <button class="flex items-center gap-2 text-sm text-slate-400 hover:text-red-400 transition-colors px-2 py-1.5 rounded-lg hover:bg-red-500/10"><i data-lucide="log-out" class="w-4 h-4"></i>Sign Out</button>
    <button class="p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10 transition-colors"><i data-lucide="trash-2" class="w-[15px] h-[15px]"></i></button>
    <button class="flex items-center gap-1 text-xs text-[#f26a21] hover:underline">+3 more <i data-lucide="chevron-right" class="w-3 h-3"></i></button>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
