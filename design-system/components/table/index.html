<!-- @dsCard group="Components" name="Data table" subtitle="Jobs list — header, rows, status, actions" width="1100" height="460" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Data table</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Data table</h1>

  <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl overflow-hidden">
    <div class="overflow-x-auto">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-[#1f3354]">
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Job #</th>
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Address</th>
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Owner</th>
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Status</th>
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider">Date of Loss</th>
            <th class="px-4 py-3 text-left text-xs font-bold text-slate-500 uppercase tracking-wider"></th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-b border-[#1f3354]/50 hover:bg-[#16263d] cursor-pointer transition-colors group">
            <td class="px-4 py-3"><span class="font-mono text-xs text-slate-400 group-hover:text-[#f26a21] transition-colors">RC-2024-0142</span></td>
            <td class="px-4 py-3 text-slate-200 font-semibold">8421 Jewel Lake Rd</td>
            <td class="px-4 py-3 text-slate-400">M. Carver</td>
            <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#f26a2122;color:#f26a21">Active</span></td>
            <td class="px-4 py-3 text-slate-400">03/14/2024</td>
            <td class="px-4 py-3"><button class="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10"><i data-lucide="trash-2" class="w-[15px] h-[15px]"></i></button></td>
          </tr>
          <tr class="border-b border-[#1f3354]/50 hover:bg-[#16263d] cursor-pointer transition-colors group">
            <td class="px-4 py-3"><span class="font-mono text-xs text-slate-400 group-hover:text-[#f26a21] transition-colors">RC-2024-0139</span></td>
            <td class="px-4 py-3 text-slate-200 font-semibold">1207 W 32nd Ave</td>
            <td class="px-4 py-3 text-slate-400">D. Ngo</td>
            <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#3B82F622;color:#3B82F6">Drying</span></td>
            <td class="px-4 py-3 text-slate-400">03/09/2024</td>
            <td class="px-4 py-3"><button class="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10"><i data-lucide="trash-2" class="w-[15px] h-[15px]"></i></button></td>
          </tr>
          <tr class="border-b border-[#1f3354]/50 bg-red-950/20">
            <td colspan="6" class="px-4 py-3">
              <div class="flex items-center gap-3">
                <p class="text-sm text-red-300 flex-1">Delete <span class="font-bold">RC-2024-0131 — 340 Muldoon Rd</span>? This cannot be undone.</p>
                <button class="px-3 h-8 bg-red-600 hover:bg-red-700 text-white text-xs font-bold rounded-lg transition-colors">Yes, Delete</button>
                <button class="px-3 h-8 bg-[#1f3354] text-slate-300 text-xs font-bold rounded-lg hover:bg-[#4A4440] transition-colors">Cancel</button>
              </div>
            </td>
          </tr>
          <tr class="hover:bg-[#16263d] cursor-pointer transition-colors group">
            <td class="px-4 py-3"><span class="font-mono text-xs text-slate-400 group-hover:text-[#f26a21] transition-colors">RC-2024-0128</span></td>
            <td class="px-4 py-3 text-slate-200 font-semibold">55 Klatt Rd</td>
            <td class="px-4 py-3 text-slate-400">R. Sage</td>
            <td class="px-4 py-3"><span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#1f9d5522;color:#1f9d55">Closed</span></td>
            <td class="px-4 py-3 text-slate-400">02/28/2024</td>
            <td class="px-4 py-3"><button class="opacity-0 group-hover:opacity-100 transition-opacity p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-red-500/10"><i data-lucide="trash-2" class="w-[15px] h-[15px]"></i></button></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <script>lucide.createIcons();</script>
</body>
</html>
