<!-- @dsCard group="Components" name="Sidebar nav" subtitle="App shell — logo, nav, profile" width="320" height="600" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sidebar nav</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <aside class="flex flex-col w-60 h-[540px] bg-[#0f1b2d] border border-[#1f3354] rounded-2xl overflow-hidden">
    <div class="flex items-center gap-3 px-4 py-5 border-b border-[#1f3354]">
      <div class="w-8 h-8 rounded bg-[#f26a21] flex items-center justify-center flex-shrink-0"><span class="text-[#16263d] font-black text-sm">RC</span></div>
      <div>
        <p class="text-white font-bold text-sm leading-tight">Roybal</p>
        <p class="text-[#f26a21] text-xs font-semibold leading-tight tracking-widest">CONSTRUCTION</p>
      </div>
    </div>

    <nav class="flex-1 py-4 px-3 space-y-1">
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors bg-[#f26a21]/15 text-[#f26a21]"><i data-lucide="layout-dashboard" class="w-[18px] h-[18px]"></i>Dashboard</a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors text-slate-400 hover:text-slate-200 hover:bg-[#1f3354]"><i data-lucide="briefcase" class="w-[18px] h-[18px]"></i>Jobs</a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors text-slate-400 hover:text-slate-200 hover:bg-[#1f3354]"><i data-lucide="settings" class="w-[18px] h-[18px]"></i>Settings</a>
      <a class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm font-semibold transition-colors text-slate-400 hover:text-slate-200 hover:bg-[#1f3354]"><i data-lucide="book-open" class="w-[18px] h-[18px]"></i>Help</a>
    </nav>

    <div class="border-t border-[#1f3354] p-4">
      <div class="flex items-center gap-3 mb-3">
        <div class="w-8 h-8 rounded-full bg-[#f26a21] flex items-center justify-center flex-shrink-0"><span class="text-[#16263d] font-bold text-sm">B</span></div>
        <div class="min-w-0">
          <p class="text-sm font-semibold text-slate-200 truncate">Branden Roybal</p>
          <p class="text-xs text-slate-500 capitalize">owner</p>
        </div>
      </div>
      <button class="flex items-center gap-2 w-full text-sm text-slate-400 hover:text-red-400 transition-colors px-2 py-1.5 rounded-lg hover:bg-red-500/10"><i data-lucide="log-out" class="w-4 h-4"></i>Sign Out</button>
    </div>
  </aside>
  <script>lucide.createIcons();</script>
</body>
</html>
