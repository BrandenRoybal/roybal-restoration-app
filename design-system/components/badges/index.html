<!-- @dsCard group="Components" name="Status badges" subtitle="Pill + dot variants" width="900" height="360" -->
<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Status badges</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Status badges</h1>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Pill (table / detail)</p>
  <div class="flex flex-wrap gap-3 mb-8">
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#64748B22;color:#64748B">New</span>
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#f26a2122;color:#f26a21">Active</span>
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#3B82F622;color:#3B82F6">Drying</span>
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#e0a80022;color:#e0a800">Final Inspection</span>
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#A855F722;color:#A855F7">Invoicing</span>
    <span class="px-2.5 py-1 rounded-full text-xs font-bold" style="background:#1f9d5522;color:#1f9d55">Closed</span>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Count chip (pipeline header)</p>
  <div class="flex flex-wrap gap-3 mb-8">
    <span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:#f26a2122;color:#f26a21">3</span>
    <span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:#3B82F622;color:#3B82F6">7</span>
    <span class="text-xs font-bold px-2 py-0.5 rounded-full" style="background:#A855F722;color:#A855F7">2</span>
  </div>

  <p class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-3">Dot + label</p>
  <div class="flex flex-wrap gap-5">
    <span class="flex items-center gap-2 text-xs font-bold text-slate-300"><span class="w-2.5 h-2.5 rounded-full" style="background:#f26a21"></span>Active</span>
    <span class="flex items-center gap-2 text-xs font-bold text-slate-300"><span class="w-2.5 h-2.5 rounded-full" style="background:#3B82F6"></span>Drying</span>
    <span class="flex items-center gap-2 text-xs font-bold text-slate-300"><span class="w-2.5 h-2.5 rounded-full" style="background:#1f9d55"></span>Closed</span>
  </div>
</body>
</html>
