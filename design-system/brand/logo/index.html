<!doctype html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Logo lockups</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>body{font-family:"Inter",system-ui,sans-serif;background:#16263d;color:#F1F5F9}</style>
</head>
<body class="p-8">
  <h1 class="text-xl font-bold text-white mb-6">Logo lockups</h1>
  <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">

    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-8 flex flex-col items-center justify-center">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl bg-[#f26a21] mb-4"><span class="text-[#16263d] font-black text-2xl">RC</span></div>
      <h2 class="text-3xl font-black text-white tracking-wider">ROYBAL</h2>
      <p class="text-[#f26a21] text-xs font-bold tracking-[0.4em] mt-0.5">CONSTRUCTION LLC</p>
      <div class="w-12 h-0.5 bg-[#f26a21] mx-auto mt-3 rounded-full"></div>
      <p class="text-xs font-mono text-slate-600 mt-5">Login — stacked mark</p>
    </div>

    <div class="bg-[#0f1b2d] border border-[#1f3354] rounded-2xl p-8 flex flex-col items-center justify-center">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 rounded bg-[#f26a21] flex items-center justify-center flex-shrink-0"><span class="text-[#16263d] font-black text-sm">RC</span></div>
        <div>
          <p class="text-white font-bold text-sm leading-tight">Roybal</p>
          <p class="text-[#f26a21] text-xs font-semibold leading-tight tracking-widest">CONSTRUCTION</p>
        </div>
      </div>
      <p class="text-xs font-mono text-slate-600 mt-5">Sidebar — horizontal lockup</p>
    </div>

  </div>
</body>
</html>
