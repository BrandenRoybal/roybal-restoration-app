# Roybal phone agent — always-on receptionist (a missed call can't wait for
# a cold start). Deploy from the repo root:
#   fly deploy --config services/phone-agent/fly.toml --dockerfile services/phone-agent/Dockerfile .
app = "roybal-phone"
primary_region = "sea"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  interval = "30s"
  timeout = "3s"
  grace_period = "10s"
  method = "GET"
  path = "/healthz"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
